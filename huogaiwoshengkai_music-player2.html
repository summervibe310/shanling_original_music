<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>活该我盛开 - 音乐播放器</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #1a1a2e;
            font-family: "PingFang SC", "Microsoft YaHei", "Hiragino Sans GB", sans-serif;
        }

        /* 全屏容器 */
        .phone {
            width: 100vw;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            position: relative;
        }

        /* 容器内背景视频 */
        .phone-bg-video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 0;
            opacity: 0.8;
        }

        /* 容器内半透明遮罩层 */
        .phone-overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(20, 20, 40, 0.5);
            backdrop-filter: blur(8px);
            z-index: 1;
        }

        /* 内容层 */
        .phone-content {
            position: relative;
            z-index: 2;
            display: flex;
            flex-direction: column;
            height: 100%;
            width: 100%;
        }

        /* 标题区 */
        .title-section {
            text-align: center;
            padding: max(30px, 6vh) 20px max(16px, 3vh);
            flex-shrink: 0;
        }
        .song-title {
            font-size: clamp(22px, 5vw, 28px);
            font-weight: bold;
            color: #fff;
            letter-spacing: 2px;
            margin-bottom: 4px;
        }
        .song-artist {
            font-size: clamp(12px, 2.8vw, 15px);
            color: rgba(255, 255, 255, 0.6);
            letter-spacing: 1px;
        }

        /* 女海盗视频区 */
        .pirate-section {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            min-height: 0;
            max-height: 32%;
        }
        .pirate-video {
            height: 100%;
            width: auto;
            max-width: 75%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(200, 150, 150, 0.5));
        }

        /* 歌词区 */
        .lyrics-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 max(20px, 5vw);
            min-height: 0;
            position: relative;
        }

        .lyric-line {
            width: 100%;
            padding: max(6px, 1.2vh) 0;
            transition: all 0.5s cubic-bezier(0.25, 0.8, 0.25, 1.2);
            text-align: center;
            line-height: 1.6;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            max-width: 100%;
        }

        .lyric-line.prev {
            font-size: clamp(12px, 2.8vw, 15px);
            color: rgba(255, 255, 255, 0.25);
        }

        .lyric-line.current {
            font-size: clamp(17px, 4vw, 22px);
            font-weight: bold;
            color: #ff9999;
            text-shadow: 0 0 20px rgba(255, 150, 150, 0.6);
            letter-spacing: 1px;
        }

        .lyric-line.next {
            font-size: clamp(12px, 2.8vw, 15px);
            color: rgba(255, 255, 255, 0.35);
        }

        .lyric-placeholder {
            height: clamp(20px, 4vh, 32px);
        }

        /* 进度条 */
        .progress-section {
            padding: max(12px, 2vh) max(20px, 5vw) max(6px, 1vh);
            flex-shrink: 0;
        }
        .progress-bar {
            width: 100%;
            height: 3px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 2px;
            cursor: pointer;
            position: relative;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #ff9999, #ff6666);
            border-radius: 2px;
            transition: width 0.3s linear;
            width: 0%;
        }
        .progress-thumb {
            position: absolute;
            top: 50%;
            transform: translate(-50%, -50%);
            width: 12px;
            height: 12px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 150, 150, 0.8);
            cursor: pointer;
            transition: left 0.1s linear;
            left: 0%;
        }
        .time-display {
            display: flex;
            justify-content: space-between;
            color: rgba(255, 255, 255, 0.4);
            font-size: clamp(10px, 2vw, 12px);
            margin-top: 6px;
        }

        /* 控制区 */
        .controls-section {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: clamp(24px, 8vw, 40px);
            padding: max(10px, 2vh) max(20px, 5vw) max(20px, 4vh);
            flex-shrink: 0;
        }
        .ctrl-btn {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.7);
            font-size: clamp(20px, 5vw, 24px);
            cursor: pointer;
            transition: all 0.2s;
            width: clamp(40px, 10vw, 50px);
            height: clamp(40px, 10vw, 50px);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .ctrl-btn:hover {
            color: #fff;
            background: rgba(255, 255, 255, 0.1);
        }
        .ctrl-btn.play-btn {
            width: clamp(56px, 14vw, 70px);
            height: clamp(56px, 14vw, 70px);
            background: linear-gradient(135deg, #ff6666, #cc4444);
            color: #fff;
            font-size: clamp(24px, 6vw, 30px);
            box-shadow: 0 8px 30px rgba(255, 100, 100, 0.4);
        }
        .ctrl-btn.play-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 12px 40px rgba(255, 100, 100, 0.6);
        }

        /* 底部网易云链接 */
        .netease-link {
            text-align: center;
            padding: 0 max(20px, 5vw) max(12px, 2vh);
            flex-shrink: 0;
        }
        .netease-link a {
            color: rgba(255, 255, 255, 0.4);
            text-decoration: none;
            font-size: clamp(10px, 2vw, 12px);
            letter-spacing: 1px;
            transition: color 0.2s;
        }
        .netease-link a:hover {
            color: rgba(255, 255, 255, 0.7);
        }

        /* 安全区域适配 */
        @supports (padding-top: env(safe-area-inset-top)) {
            .title-section {
                padding-top: calc(env(safe-area-inset-top) + max(30px, 6vh));
            }
            .netease-link {
                padding-bottom: calc(env(safe-area-inset-bottom) + max(12px, 2vh));
            }
            .controls-section {
                padding-bottom: calc(env(safe-area-inset-bottom) + max(20px, 4vh));
            }
        }
    </style>
</head>
<body>

    <!-- 全屏容器 -->
    <div class="phone">
        <!-- 容器内背景视频 -->
        <video class="phone-bg-video" autoplay muted loop playsinline preload="auto">
            <source src="huogaiwoshengkai.mp4" type="video/mp4">
        </video>

        <!-- 半透明遮罩 -->
        <div class="phone-overlay"></div>

        <!-- 内容层 -->
        <div class="phone-content">
            <!-- 标题 -->
            <div class="title-section">
                <div class="song-title">活该我盛开</div>
                <div class="song-artist">山岭在逃 · 第三行</div>
            </div>

            <!-- 女海盗视频 -->
            <div class="pirate-section">
                <video class="pirate-video" autoplay muted loop playsinline preload="none">
                    <source src="captain.webm" type="video/webm">
                </video>
            </div>

            <!-- 歌词区 -->
            <div class="lyrics-section" id="lyricsSection">
                <div class="lyric-placeholder"></div>
                <div class="lyric-line prev" id="prevLine"></div>
                <div class="lyric-line current" id="currentLine">🎵 点击播放</div>
                <div class="lyric-line next" id="nextLine"></div>
                <div class="lyric-placeholder"></div>
            </div>

            <!-- 进度条 -->
            <div class="progress-section">
                <div class="progress-bar" id="progressBar">
                    <div class="progress-fill" id="progressFill"></div>
                    <div class="progress-thumb" id="progressThumb"></div>
                </div>
                <div class="time-display">
                    <span id="currentTime">00:00</span>
                    <span id="totalTime">00:00</span>
                </div>
            </div>

            <!-- 控制区 -->
            <div class="controls-section">
                <button class="ctrl-btn" id="prevBtn" title="上一首">⏮</button>
                <button class="ctrl-btn play-btn" id="playBtn" title="播放">▶</button>
                <button class="ctrl-btn" id="nextBtn" title="下一首">⏭</button>
            </div>

            <!-- 网易云链接 -->
            <div class="netease-link">
                <a href="https://163cn.tv/8OWPUVm" target="_blank">🎵 在网易云音乐收听</a>
            </div>
        </div>
    </div>

    <!-- 隐藏的音频元素 -->
    <audio id="audio" preload="auto">
        <source src="活该我盛开.mp3" type="audio/mpeg">
    </audio>

    <script>
        (function() {
            var lyrics = [
                { time: 18.99, text: "空心人 站进人海" },
                { time: 23.34, text: "只剩九十斤的反骨 还在" },
                { time: 26.88, text: "废墟里 排队等一个赦免" },
                { time: 30.72, text: "等月光失约 才学会" },
                { time: 35.52, text: "做自己的女娲 重塑这人间" },
                { time: 44.13, text: "眼泪是大的海" },
                { time: 47.13, text: "那就溺死 我的从前" },
                { time: 52.74, text: "活该我盛开" },
                { time: 55.44, text: "活该我 哭着哭着就笑出来" },
                { time: 61.35, text: "活该我盛开" },
                { time: 64.05, text: "活该我 偏偏要 嫁给自由 嫁给我的 不够乖" },
                { time: 71.64, text: "不死鸟 决定叛逃" },
                { time: 74.82, text: "一万场落日 收集羽毛" },
                { time: 78.60, text: "葡萄要静候 等待是生长" },
                { time: 82.56, text: "春雷不是号角 是我终于" },
                { time: 85.32, text: "被自己 听见的心跳" },
                { time: 88.95, text: "反正短暂" },
                { time: 93.06, text: "反正 要燃烧" },
                { time: 95.76, text: "活该我盛开" },
                { time: 98.40, text: "活该我 坏到最后又亮起来" },
                { time: 104.28, text: "活该我盛开" },
                { time: 106.98, text: "活该我 赤着脚 踏过荒芜 踏成我自己的 节拍" },
                { time: 113.37, text: "驶向 不被命名的航线" },
                { time: 115.38, text: "不必上岸" },
                { time: 116.40, text: "我偏爱 颠倒的罗盘" },
                { time: 118.32, text: "做海盗 掠夺快乐 升起红粉骷髅旗" },
                { time: 122.28, text: "你看 我这艘写满补丁的船" },
                { time: 126.24, text: "正劫持 整片黑暗" },
                { time: 131.91, text: "嘿 看着吧" },
                { time: 133.74, text: "这是我 千千万万遍" },
                { time: 136.89, text: "救我于水火之后 撰写的答案" },
                { time: 140.64, text: "我是自己的靠山" },
                { time: 142.80, text: "我是自己的太阳" },
                { time: 144.90, text: "我是自己的月亮" },
                { time: 146.58, text: "我是 我唯一的 标签 与规范" },
                { time: 150.75, text: "活该我 如此灿烂" },
                { time: 153.99, text: "活该我 又争又抢 又不慌不忙" },
                { time: 160.41, text: "活该我 终于长成 一株" },
                { time: 163.02, text: "迎着烈日 拔节作响的" },
                { time: 165.48, text: "——野生的光" },
                { time: 199.41, text: "Oh captain my captain" },
                { time: 204.81, text: "Oh captain my captain" },
                { time: 211.23, text: "Oh captain my captain" },
                { time: 212.61, text: "不等谁 送花来" },
                { time: 215.94, text: "这朵玫瑰 我自己摘" },
                { time: 221.46, text: "活该 我" },
                { time: 223.32, text: "盛" },
                { time: 223.71, text: "开" }
            ];

            var audio = document.getElementById('audio');
            var playBtn = document.getElementById('playBtn');
            var prevBtn = document.getElementById('prevBtn');
            var nextBtn = document.getElementById('nextBtn');
            var progressBar = document.getElementById('progressBar');
            var progressFill = document.getElementById('progressFill');
            var progressThumb = document.getElementById('progressThumb');
            var currentTimeEl = document.getElementById('currentTime');
            var totalTimeEl = document.getElementById('totalTime');
            var prevLineEl = document.getElementById('prevLine');
            var currentLineEl = document.getElementById('currentLine');
            var nextLineEl = document.getElementById('nextLine');
            var currentIndex = -1;
            var isPlaying = false;

            function formatTime(seconds) {
                var m = Math.floor(seconds / 60);
                var s = Math.floor(seconds % 60);
                return (m < 10 ? '0' + m : m) + ':' + (s < 10 ? '0' + s : s);
            }

            function updateLyrics() {
                var t = audio.currentTime;
                var index = -1;
                for (var i = lyrics.length - 1; i >= 0; i--) {
                    if (t >= lyrics[i].time) {
                        index = i;
                        break;
                    }
                }
                if (index !== currentIndex) {
                    currentIndex = index;
                    if (index >= 0) {
                        prevLineEl.textContent = index > 0 ? lyrics[index - 1].text : '';
                        currentLineEl.textContent = lyrics[index].text;
                        nextLineEl.textContent = index < lyrics.length - 1 ? lyrics[index + 1].text : '';
                    } else {
                        prevLineEl.textContent = '';
                        currentLineEl.textContent = '🎵 点击播放';
                        nextLineEl.textContent = '';
                    }
                }
            }

            function updateProgress() {
                if (audio.duration && !isNaN(audio.duration)) {
                    var pct = (audio.currentTime / audio.duration) * 100;
                    progressFill.style.width = pct + '%';
                    progressThumb.style.left = pct + '%';
                    currentTimeEl.textContent = formatTime(audio.currentTime);
                }
            }

            function togglePlay() {
                if (audio.paused) {
                    audio.play().then(function() {
                        isPlaying = true;
                        playBtn.textContent = '⏸';
                    }).catch(function() {});
                } else {
                    audio.pause();
                    isPlaying = false;
                    playBtn.textContent = '▶';
                }
            }

            playBtn.addEventListener('click', togglePlay);

            prevBtn.addEventListener('click', function() {
                if (currentIndex > 0) {
                    audio.currentTime = lyrics[currentIndex - 1].time;
                } else {
                    audio.currentTime = 0;
                }
                if (audio.paused) togglePlay();
            });

            nextBtn.addEventListener('click', function() {
                if (currentIndex < lyrics.length - 1) {
                    audio.currentTime = lyrics[currentIndex + 1].time;
                }
                if (audio.paused) togglePlay();
            });

            progressBar.addEventListener('click', function(e) {
                var rect = progressBar.getBoundingClientRect();
                var pct = (e.clientX - rect.left) / rect.width;
                audio.currentTime = pct * audio.duration;
            });

            audio.addEventListener('timeupdate', function() {
                updateLyrics();
                updateProgress();
            });

            audio.addEventListener('loadedmetadata', function() {
                totalTimeEl.textContent = formatTime(audio.duration);
                currentTimeEl.textContent = '00:00';
            });

            audio.addEventListener('play', function() {
                isPlaying = true;
                playBtn.textContent = '⏸';
            });

            audio.addEventListener('pause', function() {
                isPlaying = false;
                playBtn.textContent = '▶';
            });

            audio.addEventListener('ended', function() {
                isPlaying = false;
                playBtn.textContent = '▶';
                currentIndex = -1;
                prevLineEl.textContent = '';
                currentLineEl.textContent = '🎵 播放完毕';
                nextLineEl.textContent = '';
            });

            currentLineEl.textContent = '🎵 点击播放';
            totalTimeEl.textContent = '03:43';

        })();
    </script>
</body>
</html>
